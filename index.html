<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>
<body>
    <header class = "grid grid-cols-1 md:grid-cols-2 container m-auto">
        <div class = "left-side space-y-8">
            <h2 class = "text-[70px] font-extrabold leading-tight">It's good <br> tea time at The <br> Tea House</h2>
            <p class = "text-[18px] font-[500px] text-[#777777FF]">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To Your Taste Buds.</p>
            <button class = "rounded-[10px] bg-linear-to-r from-[#FF8938] to-[#FF0000] p-4 text-white font-bold"> Explore More <span class = "-rotate-45 inline-block"> <i class="fa-solid fa-arrow-right"></i></span> </button>
        </div>
        <div class = "right-side flex justify-end items-end relative">
            <img src="./images/banner.png" alt="">
            <div class = "absolute bottom-5 sm:left-35 w-[250px] h-[100px] flex justify-around items-center bg-white shadow-2xl rounded-[10px] md:left-60">
                <img src="./images/star.png" alt="" class = "h-14">
                <div>
                    <h2 class = "text-3xl font-extrabold">5.00</h2>
                    <p class = "text-[#777777FF]">Trust Pilot Ratings</p>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
